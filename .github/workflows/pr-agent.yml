# PR Agent — Review automático con IA (Gemini, gratis)
name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main, develop]
  issue_comment:
    types: [created]

jobs:
  pr_agent:
    if: >-
      (github.event_name == 'pull_request' && github.event.sender.type != 'Bot') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.sender.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: PR Agent
        uses: qodo-ai/pr-agent@19237a5d1054069173ec2f50b4ac2b1957c57fef # main 2026-04-20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          config.model: "gemini/gemini-2.5-pro"
          config.fallback_models: '["gemini/gemini-2.5-flash", "gemini/gemini-2.0-flash"]'
          config.ai_timeout: "180"
          config.response_language: "es"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          pr_code_suggestions.num_code_suggestions: "4"
          pr_code_suggestions.extra_instructions: "Este es un proyecto SaaS multi-tenant (Django + Next.js). Si el PR es solo UI/CSS/copy, sugiere mejoras de accesibilidad, performance o patrones React."
          pr_reviewer.extra_instructions: "Este es un proyecto SaaS multi-tenant (Django + Next.js). Revisa seguridad multi-tenant, accesibilidad WCAG AA, patrones React/Next.js."
