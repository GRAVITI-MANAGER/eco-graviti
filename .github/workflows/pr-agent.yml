# PR Agent — Review automático con IA (Gemini, gratis)
name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main, develop]
  issue_comment:
    types: [created]

jobs:
  pr_agent:
    if: >-
      (github.event_name == 'pull_request' && github.event.sender.type != 'Bot') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.sender.type != 'Bot')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: .pr_agent.toml
          sparse-checkout-cone-mode: false
      - name: PR Agent
        uses: qodo-ai/pr-agent@19237a5d1054069173ec2f50b4ac2b1957c57fef # main 2026-04-20
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          config.model: "gemini/gemini-2.5-pro"
          config.fallback_models: '["gemini/gemini-2.5-flash", "gemini/gemini-2.0-flash"]'
          config.ai_timeout: "180"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
